# ── HTTP-only config — used ONLY during initial SSL certificate setup ─────────
# After getting SSL cert via Certbot, switch to nginx.conf (HTTPS).
# Steps:
#   1. Copy this file: cp docker/nginx/nginx.http.conf docker/nginx/nginx.conf
#   2. Start nginx: docker compose up -d nginx
#   3. Run certbot: ./scripts/setup-ssl.sh yourdomain.com
#   4. Restore SSL config: cp docker/nginx/nginx.ssl.conf docker/nginx/nginx.conf
#   5. Restart nginx: docker compose restart nginx

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile   on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream backend  { server backend:8080;  keepalive 16; }
    upstream frontend { server frontend:3000; keepalive 8; }

    server {
        listen 80;
        server_name _;

        # Certbot challenge (needed for SSL cert issuance)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API proxy
        location /api/ {
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
            client_max_body_size 15m;
        }

        # Frontend
        location / {
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params;
        }
    }
}
