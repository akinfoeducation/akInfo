events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_zone:10m     rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m      rate=30r/s;
    limit_req_zone $binary_remote_addr zone=public_zone:10m   rate=60r/s;

    upstream backend  { server backend:8080;  keepalive 16; }
    upstream frontend { server frontend:3000; keepalive 8; }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name akinfoinstitute.tech www.akinfoinstitute.tech;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name akinfoinstitute.tech www.akinfoinstitute.tech;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Auth endpoints — strict rate limiting
        location /api/v1/auth/login {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        location /api/v1/auth/refresh {
            limit_req zone=auth_zone burst=20 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
        }

        # All other API traffic
        location /api/ {
            limit_req zone=api_zone burst=60 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params;
            client_max_body_size 15m;
        }

        # Actuator — internal health check only (block external)
        location /actuator/ {
            allow 172.16.0.0/12;  # Docker internal
            deny all;
            proxy_pass http://backend;
        }

        # Block Swagger UI + API docs in production
        location /swagger-ui {
            return 403;
        }
        location /v3/api-docs {
            return 403;
        }
        location /swagger-resources {
            return 403;
        }

        # Block Meilisearch from external access
        location /meilisearch {
            return 403;
        }

        # Frontend (public website + admin SPA)
        location / {
            limit_req zone=public_zone burst=100 nodelay;
            proxy_pass http://frontend;
            include /etc/nginx/proxy_params;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
