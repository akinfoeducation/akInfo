name: "🔧 Backend CI/CD"
run-name: "🔧 Backend — ${{ github.event_name == 'workflow_dispatch' && 'Manual deploy' || github.event.head_commit.message }}"

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:      # allow manual trigger from GitHub UI

env:
  IMAGE: ghcr.io/akinfoeducation/akinfo-backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    # The CRM workflow Cucumber suite boots the full app against a real Postgres
    # (CucumberSpringConfiguration creates a throwaway akt_institute_test DB and
    # runs the real Flyway migrations). Provide a matching DB; connection is
    # supplied via the IT_DB_* env on the test step below.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: akt_user
          POSTGRES_PASSWORD: devpassword123
          POSTGRES_DB: akt_institute
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U akt_user -d akt_institute"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon
        working-directory: backend/aktInstituteOS
        env:
          IT_DB_HOST: localhost
          IT_DB_PORT: 5432
          IT_DB_USER: akt_user
          IT_DB_PASSWORD: devpassword123
          IT_DB_NAME: akt_institute

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/aktInstituteOS/build/reports/tests/

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build JAR (skip tests — already ran)
        run: ./gradlew bootJar --no-daemon -x test
        working-directory: backend/aktInstituteOS

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend/aktInstituteOS
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Push a plain single-platform image manifest. The default attestation
          # manifests (provenance/SBOM) make `latest` an OCI image index with extra
          # `unknown/unknown` entries that older Docker on the VPS can fail to resolve
          # ("content digest ... not found" on `docker compose pull`).
          provenance: false
          sbom: false

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy backend container
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ env.IMAGE }}:latest
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG
          script: |
            set -e
            cd /opt/akinfo

            echo "Logging into GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "Pulling latest backend image..."
            # Retry to ride out transient GHCR consistency hiccups (a freshly-pushed
            # manifest can briefly 404 a referenced blob).
            for attempt in 1 2 3; do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend; then
                break
              fi
              echo "Pull attempt $attempt failed; retrying in 10s..."
              sleep 10
              [ "$attempt" = 3 ] && { echo "Backend image pull failed after 3 attempts"; exit 1; }
            done

            echo "Restarting backend container..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d \
              --no-deps --force-recreate backend

            echo "Waiting for health check..."
            sleep 15
            docker inspect --format='{{.State.Health.Status}}' akt-backend || true

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Backend deployed successfully ✅"
